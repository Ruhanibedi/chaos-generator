apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-dashboard
  template:
    metadata:
      labels:
        app: chaos-dashboard
    spec:
      serviceAccountName: chaos-dashboard-sa
      containers:
      - name: dashboard
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
        - |
          pip install flask -q
          python /app/dashboard.py
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: dashboard-code
          mountPath: /app
      volumes:
      - name: dashboard-code
        configMap:
          name: dashboard-code
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-dashboard-svc
spec:
  type: LoadBalancer
  selector:
    app: chaos-dashboard
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chaos-dashboard-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: chaos-dashboard-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: chaos-dashboard-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: chaos-dashboard-role
subjects:
- kind: ServiceAccount
  name: chaos-dashboard-sa
  namespace: default
