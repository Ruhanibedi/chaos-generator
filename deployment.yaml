apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-target
  labels:
    app: chaos-target
spec:
  replicas: 3
  selector:
    matchLabels:
      app: chaos-target
  template:
    metadata:
      labels:
        app: chaos-target
    spec:
      containers:
      - name: chaos-target
        image: nginx:latest
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-target-svc
spec:
  type: LoadBalancer
  selector:
    app: chaos-target
  ports:
  - port: 80
    targetPort: 80
